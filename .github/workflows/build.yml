name: Build Flipper ESP32 Variants

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.board.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        board:
          - name: generic_esp32s3
            script_key: s3
            target: esp32s3
            build_dir: build_s3
            artifact_name: flipper-esp32s3-generic

          - name: lilygo_t_embed_cc1101
            script_key: t_embed
            target: esp32s3
            build_dir: build_t_embed
            artifact_name: flipper-lilygo-t-embed-cc1101

          - name: waveshare_c6_1.9
            script_key: c6
            target: esp32c6
            build_dir: build_waveshare_c6
            artifact_name: flipper-waveshare-c6-1.9

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up ESP-IDF ${{ matrix.board.target }}
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4.1
          target: ${{ matrix.board.target }}

      - name: Build with combined script
        shell: bash
        run: |
          # Ensure the script is executable
          chmod +x ./build.sh

          # Use the --build-only flag to skip serial port detection/flashing
          # and the --board flag to select the specific config
          ./build.sh --board ${{ matrix.board.script_key }} --build-only

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.board.artifact_name }}
          path: |
            ${{ matrix.board.build_dir }}/*.bin
            ${{ matrix.board.build_dir }}/bootloader/bootloader.bin
            ${{ matrix.board.build_dir }}/partition_table/partition-table.bin
          retention-days: 30

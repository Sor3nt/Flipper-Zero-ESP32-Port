name: Build Flipper ESP32 Variants

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.board.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60 # ← Increased timeout

    strategy:
      matrix:
        board:
          - name: generic_esp32s3
            target: esp32s3
            build_dir: build_generic
            flipper_board: generic_esp32s3
            artifact_name: flipper-esp32s3-generic

          - name: lilygo_t_embed_cc1101
            target: esp32s3
            build_dir: build_t_embed
            flipper_board: lilygo_t_embed_cc1101
            artifact_name: flipper-lilygo-t-embed-cc1101

          - name: waveshare_c6_1.9
            target: esp32c6
            build_dir: build_waveshare_c6
            flipper_board: waveshare_c6_1.9
            artifact_name: flipper-waveshare-c6-1.9

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: ESP-IDF Cache + Setup
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4.1
          target: ${{ matrix.board.target }}
          cache: true # ← Very important

      - name: Build ${{ matrix.board.name }}
        shell: bash
        run: |
          source $IDF_PATH/export.sh

          echo "🛠 Building ${{ matrix.board.name }}..."

          rm -f sdkconfig
          rm -rf ${{ matrix.board.build_dir }}

          idf.py -B ${{ matrix.board.build_dir }} set-target ${{ matrix.board.target }}

          idf.py -B ${{ matrix.board.build_dir }} \
            -DFLIPPER_BOARD=${{ matrix.board.flipper_board }} \
            reconfigure build --no-warnings
